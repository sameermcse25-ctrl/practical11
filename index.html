<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML5 APIs Demo</title>

  <style>
    body {
      font-family: Arial;
      margin: 20px;
      background: #f4f7f9;
    }

    h1 {
      text-align: center;
      color: #2c3e50;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 { color: #3498db; }

    /* Drag */
    .draggable {
      padding: 10px;
      background: #3498db;
      color: white;
      margin: 5px;
      display: inline-block;
      cursor: grab;
      border-radius: 5px;
    }

    #dropzone {
      border: 2px dashed #3498db;
      height: 120px;
      margin-top: 10px;
      text-align: center;
      line-height: 120px;
    }

    /* Buttons */
    button {
      padding: 10px;
      margin-top: 10px;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
    }

    input {
      padding: 8px;
      margin-top: 5px;
      width: 90%;
    }
  </style>
</head>

<body>

<h1>HTML5 APIs Demo</h1>

<div class="container">

  <!-- Drag -->
  <div class="card">
    <h2>Drag & Drop</h2>

    <div class="draggable" draggable="true">Item 1</div>
    <div class="draggable" draggable="true">Item 2</div>

    <div id="dropzone">Drop Here</div>
    <div id="result"></div>
  </div>

  <!-- Geolocation -->
  <div class="card">
    <h2>Geolocation</h2>

    <button onclick="getLocation()">Get Location</button>

    <p id="location"></p>

    <hr>
    <p>Manual Location:</p>

    <input type="text" id="lat" placeholder="Latitude">
    <input type="text" id="lon" placeholder="Longitude">

    <button onclick="manualLocation()">Show Manual</button>
  </div>

  <!-- Storage -->
  <div class="card">
    <h2>Web Storage</h2>

    <input type="text" id="name" placeholder="Enter name">

    <button onclick="save()">Save</button>
    <button onclick="load()">Load</button>

    <p id="output"></p>
  </div>

</div>

<script>

  // Drag & Drop
  const items = document.querySelectorAll(".draggable");
  const dropzone = document.getElementById("dropzone");

  items.forEach(item => {
    item.addEventListener("dragstart", e => {
      e.dataTransfer.setData("text", item.innerText);
    });
  });

  dropzone.addEventListener("dragover", e => e.preventDefault());

  dropzone.addEventListener("drop", e => {
    e.preventDefault();
    const data = e.dataTransfer.getData("text");
    document.getElementById("result").innerHTML += `✅ ${data}<br>`;
  });

  // Geolocation
  function getLocation() {
    const loc = document.getElementById("location");

    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(pos => {
        loc.innerHTML = `Lat: ${pos.coords.latitude}, Lon: ${pos.coords.longitude}`;
      }, () => {
        loc.innerHTML = "Error getting location";
      });
    }
  }

  function manualLocation() {
    const lat = document.getElementById("lat").value;
    const lon = document.getElementById("lon").value;

    document.getElementById("location").innerHTML =
      `Manual -> Lat: ${lat}, Lon: ${lon}`;
  }

  // Storage
  function save() {
    const name = document.getElementById("name").value;
    localStorage.setItem("user", name);
    alert("Saved!");
  }

  function load() {
    const name = localStorage.getItem("user");
    document.getElementById("output").innerHTML =
      name ? `Saved Name: ${name}` : "No data";
  }

</script>

</body>
</html>
